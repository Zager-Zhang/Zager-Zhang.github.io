<!-- Custom CSS Styles -->
<style>
  :root {
    --about-space-1: 6px;
    --about-space-2: 10px;
    --about-space-3: 16px;
    --about-space-4: 24px;
    --about-space-5: 36px;
  }

  /* 灰色加粗文字样式 */
  .gray-bold {
    color: gray;
    font-weight: bold;
  }

  .about-section-title {
    margin: var(--about-space-5) 0 var(--about-space-3);
    padding-bottom: var(--about-space-1);
    border-bottom: 1px solid #e6ebf1;
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .publication-highlight td {
    background-color: #fff9de !important;
  }

  .publication-note {
    margin: var(--about-space-1) 0 var(--about-space-4);
    display: flex;
    justify-content: flex-end;
    gap: var(--about-space-2);
    flex-wrap: wrap;
    font-size: 0.78rem;
    color: #7a7a7a;
  }

  .publication-note span {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 999px;
    background: #f7f7f7;
    border: 1px solid #ececec;
  }

  .publication-note strong {
    font-weight: 700;
  }

  a#publications ~ html table {
    margin: 0 0 var(--about-space-3) !important;
    border: 1px solid #e8edf3;
    border-radius: 12px;
    overflow: hidden;
    background: #ffffff;
    box-shadow: 0 2px 10px rgba(20, 38, 57, 0.05);
  }

  a#publications ~ html td[style*="width:75%"] {
    color: #5b6674;
    line-height: 1.55;
  }

  a#publications ~ html papertitle {
    display: block;
    margin-bottom: 2px;
    font-size: 1.03rem;
    line-height: 1.45;
  }

  a#publications ~ html papertitle strong {
    color: #1f2f44;
    font-weight: 700;
  }

  a#publications ~ html td[style*="width:75%"] em {
    color: #6c7886;
    font-size: 0.94rem;
  }

  a#publications ~ html td[style*="width:75%"] > a {
    display: inline-flex;
    align-items: center;
    margin: 6px 6px 0 0;
    vertical-align: middle;
  }

  a#publications ~ html td[style*="width:75%"] > a img {
    display: block;
    height: 20px;
    width: auto;
  }

  .selected-honors {
    list-style: none;
    margin: var(--about-space-2) 0 0;
    padding: 0;
    display: grid;
    gap: var(--about-space-2);
  }

  .selected-honors li {
    padding: 10px 12px;
    border: 1px solid #eceff3;
    border-left: 4px solid #d7dee8;
    border-radius: 8px;
    background: #fbfcfe;
  }

  .selected-honors li.honor-featured {
    background: #eef6ff;
    border-color: #d7e8ff;
    border-left-color: #7fb3ff;
  }

  .selected-honors li.honor-featured .honor-title {
    color: #1d4670;
  }

  .honor-title {
    display: block;
    font-weight: 600;
    color: #2a2a2a;
    line-height: 1.4;
  }

  .honor-meta {
    display: block;
    margin-top: 2px;
    color: #6f7b87;
    font-size: 0.85rem;
  }

  .service-list {
    list-style: none;
    margin: var(--about-space-2) 0 var(--about-space-4);
    padding: 0;
    display: grid;
    gap: var(--about-space-2);
  }

  .service-list li {
    padding: 9px 12px;
    border: 1px solid #e4f0ee;
    border-left: 4px solid #8bbfba;
    border-radius: 8px;
    background: #f5fbfa;
  }

  .service-label {
    display: block;
    font-weight: 600;
    color: #1f4f4a;
    line-height: 1.35;
  }

  .service-meta {
    display: block;
    margin-top: 2px;
    color: #55706d;
    font-size: 0.86rem;
  }

  a#publications ~ html td[style*="width:25%"] {
    width: 28% !important;
  }

  a#publications ~ html td[style*="width:75%"] {
    width: 72% !important;
  }

  img[src*="images/publications/"] {
    transition: transform 0.22s ease, box-shadow 0.22s ease;
    transform: scale(1);
    transform-origin: center center;
    border-radius: 10px;
  }

  td:hover > img[src*="images/publications/"] {
    transform: scale(1.04);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
  }

  @media (prefers-reduced-motion: reduce) {
    img[src*="images/publications/"] {
      transition: none;
    }

    td:hover > img[src*="images/publications/"] {
      transform: none;
      box-shadow: none;
    }
  }

  @media (max-width: 760px) {
    .about-section-title {
      margin-top: var(--about-space-4);
    }

    .publication-note {
      justify-content: flex-start;
      margin-bottom: var(--about-space-3);
    }

    a#publications ~ html table,
    a#publications ~ html table tr,
    a#publications ~ html table td {
      display: block;
      width: 100% !important;
    }

    a#publications ~ html table td[style*="width:25%"] {
      padding: 12px 12px 6px !important;
      text-align: center;
    }

    a#publications ~ html table td[style*="width:75%"] {
      padding: 8px 12px 12px !important;
    }

    a#publications ~ html td[style*="width:25%"] img[src*="images/publications/"] {
      width: 100%;
      max-width: 360px;
      height: auto;
      margin: 0 auto;
    }

    a#publications ~ html td[style*="width:75%"] > a {
      margin-top: 8px;
      margin-right: 5px;
    }
  }
</style>
