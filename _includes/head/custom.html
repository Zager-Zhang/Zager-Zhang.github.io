<!-- Custom CSS Styles -->
<style>
  /* 灰色加粗文字样式 */
  .gray-bold {
    color: gray;
    font-weight: bold;
  }

  .publication-highlight td {
    background-color: #fff9de;
  }

  .publication-note {
    margin: 2px 0 14px;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    flex-wrap: wrap;
    font-size: 0.78rem;
    color: #7a7a7a;
  }

  .publication-note span {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 999px;
    background: #f7f7f7;
    border: 1px solid #ececec;
  }

  .publication-note strong {
    font-weight: 700;
  }

  .selected-honors {
    list-style: none;
    margin: 10px 0 0;
    padding: 0;
    display: grid;
    gap: 10px;
  }

  .selected-honors li {
    padding: 10px 12px;
    border: 1px solid #eceff3;
    border-left: 4px solid #d7dee8;
    border-radius: 8px;
    background: #fbfcfe;
  }

  .selected-honors li.honor-featured {
    background: #eef6ff;
    border-color: #d7e8ff;
    border-left-color: #7fb3ff;
  }

  .selected-honors li.honor-featured .honor-title {
    color: #1d4670;
  }

  .honor-title {
    display: block;
    font-weight: 600;
    color: #2a2a2a;
    line-height: 1.4;
  }

  .honor-meta {
    display: block;
    margin-top: 2px;
    color: #6f7b87;
    font-size: 0.85rem;
  }
</style>
